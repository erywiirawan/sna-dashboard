name: Refresh Dashboard Data

on:
  # Manual trigger from GitHub UI or API
  workflow_dispatch:
    inputs:
      force:
        description: 'Force refresh even if no changes'
        required: false
        default: 'false'
        type: boolean
  
  # Scheduled: daily at 06:00 WIB (22:00 UTC previous day)
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC = 06:00 WIB (UTC+8)

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Fetch data from Google Sheets
        run: python3 fetch_data.py
        working-directory: .
      
      - name: Build dashboard
        run: python3 build_dashboard.py
        working-directory: .
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet dashboard_data.json index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No data changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Data changes detected"
          fi
      
      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' || inputs.force == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json index.html
          git commit -m "🔄 Auto-refresh data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
      
      - name: Deploy to Vercel
        if: steps.changes.outputs.changed == 'true' || inputs.force == 'true'
        run: |
          npm install -g vercel
          vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      
      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "✅ Dashboard refreshed and deployed"
            echo "🔗 https://sna-dashboard-rouge.vercel.app"
          else
            echo "ℹ️ No changes - dashboard is up to date"
          fi
